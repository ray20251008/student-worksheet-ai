<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>每週學習單產生器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

  :root {
    --primary: #2D6A4F;
    --accent: #F4A261;
    --soft: #E9F5EE;
    --ink: #1a1a2e;
    --muted: #6c757d;
    --border: #c8e6c9;
    --paper: #FFFEF9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: #f0f4f0;
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── SCREEN UI ── */
  .screen-ui {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--primary);
    letter-spacing: .05em;
  }

  header p {
    color: var(--muted);
    margin-top: 6px;
    font-size: .9rem;
  }

  .badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: .72rem;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 20px;
    margin-left: 8px;
    vertical-align: middle;
    letter-spacing: .04em;
  }

  /* input card */
  .card {
    background: white;
    border-radius: 16px;
    padding: 28px 32px;
    box-shadow: 0 2px 16px rgba(0,0,0,.07);
    margin-bottom: 20px;
  }

  .card h2 {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card h2 .icon { font-size: 1.2rem; }

  textarea {
    width: 100%;
    min-height: 180px;
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: .92rem;
    line-height: 1.8;
    resize: vertical;
    transition: border-color .2s;
    background: var(--paper);
  }

  textarea:focus { outline: none; border-color: var(--primary); }

  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 16px;
  }

  label.ctrl-label {
    font-size: .85rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  select {
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: .85rem;
    background: white;
    cursor: pointer;
  }

  .btn-generate {
    margin-left: auto;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 11px 28px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: .95rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background .2s, transform .1s;
  }

  .btn-generate:hover { background: #1f5038; transform: translateY(-1px); }
  .btn-generate:disabled { background: #aaa; cursor: not-allowed; transform: none; }

  .spinner {
    width: 18px; height: 18px;
    border: 3px solid rgba(255,255,255,.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
  }
  .spinner.active { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* preview area */
  #preview-area { display: none; }

  .section-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--primary);
    margin: 8px 0 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-print {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px 32px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0 auto 32px;
    transition: background .2s;
  }
  .btn-print:hover { background: #e07b3a; }

  /* ── PRINT SHEET ── */
  #print-sheet {
    background: white;
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 2px 16px rgba(0,0,0,.07);
  }

  .sheet-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 3px solid var(--primary);
    padding-bottom: 12px;
    margin-bottom: 24px;
  }

  .sheet-header .title-block h2 {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--primary);
  }

  .sheet-header .title-block p {
    font-size: .8rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .sheet-header .meta {
    text-align: right;
    font-size: .82rem;
    color: var(--muted);
    line-height: 1.9;
  }

  .meta span {
    display: inline-block;
    border-bottom: 1px solid #ccc;
    min-width: 80px;
  }

  /* sections */
  .sheet-section {
    margin-bottom: 28px;
  }

  .sheet-section-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 1rem;
    font-weight: 700;
    color: white;
    background: var(--primary);
    padding: 5px 14px;
    border-radius: 6px;
    display: inline-block;
    margin-bottom: 14px;
  }

  /* article */
  .article-box {
    background: var(--soft);
    border-left: 4px solid var(--primary);
    border-radius: 0 8px 8px 0;
    padding: 14px 18px;
    font-size: .92rem;
    line-height: 2;
    white-space: pre-wrap;
  }

  /* reading questions */
  .question-list { list-style: none; }
  .question-list li {
    padding: 10px 0;
    border-bottom: 1px dashed #ddd;
    font-size: .93rem;
    line-height: 1.8;
    display: flex;
    gap: 10px;
  }
  .question-list li:last-child { border-bottom: none; }
  .q-num {
    font-weight: 700;
    color: var(--primary);
    min-width: 24px;
  }
  .answer-line {
    display: block;
    border-bottom: 1px solid #bbb;
    margin-top: 6px;
    height: 22px;
  }

  /* ── 垂直生字簿樣式 (直式) ── */
  .vocab-cards {
    display: flex;
    flex-wrap: wrap;
    flex-direction: row-reverse; /* 從右到左排列 */
    justify-content: flex-start;
    gap: 12px;
  }
  .vocab-card-vertical {
    display: flex;
    flex-direction: column;
    align-items: center;
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    background: var(--paper);
    width: 76px;
  }
  .vocab-top-area {
    display: flex;
    flex-direction: row-reverse; /* 注音在右，國字在左 */
    margin-bottom: 8px;
    height: 52px;
  }
  .vocab-zhuyin {
    writing-mode: vertical-rl;
    font-size: 0.8rem;
    font-weight: 700;
    padding-right: 4px;
    letter-spacing: 1px;
    color: var(--ink);
  }
  .tian-box {
    width: 52px; height: 52px;
    border: 1px solid #bbb;
    border-radius: 3px;
    position: relative;
    flex-shrink: 0;
    background: white;
  }
  .tian-box::before {
    content: '';
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 1px; background: #e0e0e0;
  }
  .tian-box::after {
    content: '';
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 1px; background: #e0e0e0;
  }
  .tian-box.ghost { opacity: .45; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 1.8rem; font-family: 'Noto Serif TC', serif; }
  .vocab-practice-col {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 8px;
  }
  .vocab-phrase-area {
    writing-mode: vertical-rl;
    height: 140px;
    width: 100%;
    border: 1px dashed #aaa;
    border-radius: 4px;
    font-size: 0.85rem;
    padding: 6px;
    color: var(--muted);
  }
  .tian-box::before {
    content: '';
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 1px; background: #e0e0e0;
  }
  .tian-box::after {
    content: '';
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 1px; background: #e0e0e0;
  }
  .tian-box.ghost { opacity: .45; }

  /* math cards - 子由數學小學堂風格 */
  .math-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .math-grid-word {
    grid-template-columns: 1fr;
  }
  .math-card {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 13px;
    display: flex;
    gap: 8px;
    background: var(--paper);
    align-items: flex-start;
  }
  .math-num {
    font-weight: 900;
    color: var(--accent);
    min-width: 22px;
    font-size: .9rem;
    padding-top: 2px;
    flex-shrink: 0;
  }
  .math-card-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .math-context {
    font-size: .82rem;
    color: #555;
    line-height: 1.6;
    background: var(--soft);
    border-radius: 5px;
    padding: 4px 8px;
  }
  .math-expr-row {
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: .04em;
    padding: 2px 4px;
    color: var(--ink);
  }
  .math-ans-box {
    display: inline-block;
    min-width: 38px;
    border-bottom: 2.5px solid var(--primary);
    text-align: center;
    color: transparent;
    vertical-align: bottom;
  }
  /* word type */
  .math-card-word .math-context {
    background: #fff8f0;
  }
  .math-question {
    font-size: .88rem;
    font-weight: 700;
    color: var(--ink);
    margin-top: 2px;
  }
  .math-ans-row {
    font-size: .85rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
  }
  .math-ans-blank {
    display: inline-block;
    min-width: 100px;
    border-bottom: 1.5px solid #999;
    height: 18px;
  }

  /* answer sheet */
  .answer-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }
  .answer-item {
    background: #fff8f0;
    border: 1.5px solid #f4a261;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: .88rem;
  }
  .answer-item .ans-num {
    font-weight: 900;
    color: var(--accent);
    font-size: .78rem;
    display: block;
    margin-bottom: 2px;
  }
  .answer-item .ans-val {
    font-weight: 700;
    color: #c0392b;
    font-size: 1rem;
  }
  .answer-item .ans-expr {
    font-size: .75rem;
    color: var(--muted);
    display: block;
    margin-top: 1px;
  }

  /* error */
  .error-msg {
    color: #c0392b;
    background: #fdecea;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: .88rem;
    margin-top: 12px;
  }

  /* ── PRINT STYLES ── */
  @media print {
    body { background: white; }
    .screen-ui > *:not(#preview-area) { display: none !important; }
    #preview-area { display: block !important; }
    .btn-print { display: none !important; }
    #print-sheet {
      box-shadow: none;
      border-radius: 0;
      padding: 0;
    }
    .sheet-section { page-break-inside: avoid; }
  }
</style>
</head>
<body>
<div class="screen-ui">

  <header>
    <h1>📚 每週學習單產生器 <span class="badge">AI 輔助</span></h1>
    <p>貼入國語日報文章 → AI 自動出題、整理生字、出數學練習 → 一鍵列印</p>
  </header>

  <!-- Input Card -->
  <div class="card">
    <div id="api-key-section" style="margin-bottom: 24px; padding: 12px; background: #fff5eb; border-radius: 8px; border: 1px solid #ffe0c2; display: none;">
      <label class="ctrl-label" style="display:flex; align-items:center; gap:8px; margin-bottom: 0;">
        🔑 Gemini API Key:
        <input type="text" id="api-key" placeholder="貼上你的 API Key" style="flex:1; padding:8px; border:1px solid #ccc; border-radius:6px; font-family: monospace;">
      </label>
      <div style="font-size: 0.8rem; color: #888; margin-top: 4px; padding-left: 140px;">*你的金鑰僅會保存在你的瀏覽器中。由於網頁不支援原本的 Claude API，我幫你接回你之前設定好的 Gemini API！</div>
    </div>
    
    <h2 style="display: flex; justify-content: space-between; align-items: center;">
      <span><span class="icon">📋</span> 貼入本週文章</span>
      <button onclick="document.getElementById('api-key-section').style.display='block'" style="background:none; border:none; color:var(--muted); font-size:0.8rem; cursor:pointer; text-decoration:underline;">⚙️ 修改 API Key</button>
    </h2>
    <script>
      const savedKey = localStorage.getItem('gemini_api_key');
      if (savedKey) {
        document.getElementById('api-key').value = savedKey;
      } else {
        document.getElementById('api-key-section').style.display = 'block';
      }
    </script>
    <textarea id="article-input" placeholder="請將國語日報文章內容貼在這裡…&#10;&#10;例：&#10;小明和媽媽去市場買菜。他們買了紅蘿蔔、白菜和豆腐。&#10;媽媽說要做一鍋暖暖的湯給全家人喝。小明很期待晚餐。"></textarea>

    <div class="controls">
      <label class="ctrl-label">
        年級：
        <select id="grade">
          <option value="1">一年級</option>
          <option value="2" selected>二年級</option>
          <option value="3">三年級</option>
          <option value="4">四年級</option>
          <option value="5">五年級</option>
          <option value="6">六年級</option>
        </select>
      </label>

      <label class="ctrl-label">
        數學類型：
        <select id="math-level">
          <option value="add10">加減法（10以內）</option>
          <option value="add20">加減法（20以內）</option>
          <option value="add100">加減法（兩位數）</option>
          <option value="mul">乘法（九九乘法）</option>
          <option value="div">除法</option>
          <option value="mixed">混合四則運算</option>
          <option value="clock">看時鐘（認識時間）</option>
          <option value="date">看日期（年月日）</option>
          <option value="length">量長度（公分／公尺）</option>
        </select>
      </label>

      <button class="btn-generate" id="gen-btn" onclick="generate()">
        <div class="spinner" id="spinner"></div>
        <span id="gen-label">✨ 產生學習單</span>
      </button>
    </div>
    <div id="error-box"></div>
  </div>

  <!-- Preview & Print -->
  <div id="preview-area">
    <button class="btn-print" onclick="window.print()">🖨️ 列印學習單</button>

    <div id="print-sheet">
      <!-- header -->
      <div class="sheet-header">
        <div class="title-block">
          <h2>本週語文學習單</h2>
          <p id="sheet-date"></p>
        </div>
        <div class="meta">
          姓名：<span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><br>
          班級：<span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><br>
          日期：<span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
        </div>
      </div>

      <!-- article -->
      <div class="sheet-section">
        <div class="sheet-section-title">📖 本週文章</div>
        <div class="article-box" id="sheet-article"></div>
      </div>

      <!-- questions -->
      <div class="sheet-section">
        <div class="sheet-section-title">❓ 閱讀測驗（共3題）</div>
        <ul class="question-list" id="sheet-questions"></ul>
      </div>

      <!-- vocab -->
      <div class="sheet-section">
        <div class="sheet-section-title">✏️ 本週生字簿</div>
        <div class="vocab-cards" id="sheet-vocab"></div>
      </div>

      <!-- math -->
      <div class="sheet-section">
        <div class="sheet-section-title">🔢 數學練習（共30題）</div>
        <div class="math-grid" id="sheet-math"></div>
      </div>
    </div>

    <!-- ══ ANSWER SHEET (separate print page) ══ -->
    <div id="answer-sheet" style="display:none;">
      <div style="page-break-before:always;"></div>
      <div class="sheet-header" style="margin-top:32px;">
        <div class="title-block">
          <h2>📋 數學答案（教師版）</h2>
          <p id="answer-date"></p>
        </div>
        <div class="meta" style="color:#c0392b;font-weight:700;">
          ⚠️ 請勿發給學生
        </div>
      </div>
      <div class="answer-grid" id="answer-grid"></div>
    </div>
  </div>

</div>

<script>
const MATH_TOPIC_MAP = {
  add10:  { label:'10以內加減法', type:'calc' },
  add20:  { label:'20以內加減法', type:'calc' },
  add100: { label:'兩位數加減法', type:'calc' },
  mul:    { label:'乘法', type:'calc' },
  div:    { label:'除法', type:'calc' },
  mixed:  { label:'混合四則運算', type:'calc' },
  clock:  { label:'認識時間', type:'word' },
  date:   { label:'認識日期', type:'word' },
  length: { label:'量長度', type:'word' },
};

function getMathPrompt(level, grade) {
  const gradeLabel = grade + '年級';
  const prompts = {
    add10: `你是台灣國小數學老師，出30題國小${gradeLabel}的「10以內加減法」練習題。
純數字計算，不要文字敘述、不要情境。用□代表答案。
每題JSON格式：{"expr":"5 + 3 = □","answer":"8","type":"calc"}`,

    add20: `你是台灣國小數學老師，出30題國小${gradeLabel}的「20以內加減法」練習題。
純數字計算，不要文字敘述、不要情境。用□代表答案。
每題格式：{"expr":"15 - 7 = □","answer":"8","type":"calc"}`,

    add100: `你是台灣國小數學老師，出30題國小${gradeLabel}的「兩位數加減法」練習題。
純數字計算，不要文字敘述、不要情境。用□代表答案。
每題格式：{"expr":"45 + 32 = □","answer":"77","type":"calc"}`,

    mul: `你是台灣國小數學老師，出30題國小${gradeLabel}的乘法練習題（九九乘法範圍）。
純數字計算，不要文字敘述、不要情境。用□代表答案。
每題格式：{"expr":"7 × 8 = □","answer":"56","type":"calc"}`,

    div: `你是台灣國小數學老師，出30題國小${gradeLabel}的除法練習題（答案為正整數）。
純數字計算，不要文字敘述、不要情境。用□代表答案。
每題格式：{"expr":"24 ÷ 6 = □","answer":"4","type":"calc"}`,

    mixed: `你是台灣國小數學老師，出30題國小${gradeLabel}的四則運算混合練習題。
純數字計算，不要文字敘述、不要情境。用□代表答案。
每題格式：{"expr":"15 + 3 × 4 = □","answer":"27","type":"calc"}`,

    clock: `你是台灣國小數學老師，出30題國小${gradeLabel}的「認識時間」練習題。
純計算或簡短問答，不需要冗長情境。用___表示答案。
每題格式：{"question":"1小時30分 = ___ 分鐘","answer":"90","type":"word"}`,

    date: `你是台灣國小數學老師，出30題國小${gradeLabel}的「認識日期」練習題。
純計算或簡短問答，不需要冗長情境。用___表示答案。
每題格式：{"question":"平年有 ___ 天","answer":"365","type":"word"}`,

    length: `你是台灣國小數學老師，出30題國小${gradeLabel}的「量長度」練習題。
純計算或簡短問答，不需要冗長情境。用___表示答案。
每題格式：{"question":"3公尺5公分 = ___ 公分","answer":"305","type":"word"}`,
  };
  return prompts[level];
}

async function callGemini(apiKey, systemPrompt, userPrompt) {
  const modelsToTry = ['gemini-1.5-flash', 'gemini-2.0-flash', 'gemini-2.5-flash'];
  let lastError = null;

  for (const model of modelsToTry) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
    const payload = { contents: [{ parts: [{ text: systemPrompt + '\n\n' + userPrompt }] }] };
    payload.generationConfig = { responseMimeType: "application/json" };
    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || 'API Error');
      if (!data.candidates || data.candidates.length === 0) throw new Error("無效的回覆");
      return data.candidates[0].content.parts[0].text;
    } catch (err) {
      lastError = err;
      if (err.message.includes('not found') || err.message.includes('not supported')) {
        continue;
      } else {
        throw err;
      }
    }
  }
  throw lastError;
}

function setLoading(on) {
  document.getElementById('spinner').className = 'spinner' + (on ? ' active' : '');
  document.getElementById('gen-label').textContent = on ? '產生中 (40字與30題較耗時，請勿重整)…' : '✨ 產生學習單';
  document.getElementById('gen-btn').disabled = on;
}

function showError(msg) {
  document.getElementById('error-box').innerHTML =
    `<div class="error-msg">⚠️ ${msg}</div>`;
}

async function generate() {
  const apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) { showError('請先輸入 Gemini API Key！'); return; }
  localStorage.setItem('gemini_api_key', apiKey);

  const article = document.getElementById('article-input').value.trim();
  if (!article) { showError('請先貼入文章內容！'); return; }
  document.getElementById('error-box').innerHTML = '';
  setLoading(true);

  try {
    const grade = document.getElementById('grade').value;
    const mathLevel = document.getElementById('math-level').value;

    const SYS = '你是一位台灣國小語文老師助理，只輸出 JSON，不加任何說明或 Markdown 符號。';

    // ── 1. Questions + Vocab ──
    const qvRaw = await callGemini(apiKey, SYS, `
以下是一篇適合國小${grade}年級學生的文章：

【文章】
${article}

請完成兩件事，以 JSON 格式回傳：
1. "questions"：3個閱讀理解問題（簡短、適合${grade}年級），每題物件含 "q"（題目）
2. "vocab"：從文章中盡量選出最多40個重要生字（若文章不夠長則盡量多選），每個物件含：
   - "char"（單一漢字）
   - "zhuyin"（注音符號，例如 ㄅㄠ）
   - "radical"（部首，例如 木）
   - "strokes"（總筆畫數，數字）

只輸出純 JSON，格式：
{"questions":[{"q":"..."}],"vocab":[{"char":"","zhuyin":"","radical":"","strokes":0}]}
    `);

    // ── 2. Math ──
    const mathPrompt = getMathPrompt(mathLevel, grade);
    const mathRaw = await callGemini(apiKey, SYS, mathPrompt + `

請輸出30題，只輸出純 JSON，不加任何說明，格式為：
{"math":[...30個題目物件...]}
`);

    // parse
    const clean = s => s.replace(/```json|```/g, '').trim();
    const qvData = JSON.parse(clean(qvRaw));
    const mathData = JSON.parse(clean(mathRaw));

    renderSheet(article, qvData, mathData);
    document.getElementById('preview-area').style.display = 'block';
    document.getElementById('preview-area').scrollIntoView({ behavior: 'smooth' });

  } catch (e) {
    showError('產生失敗，請再試一次。（' + e.message + '）');
  } finally {
    setLoading(false);
  }
}

function renderSheet(article, qv, math) {
  // date
  const now = new Date();
  document.getElementById('sheet-date').textContent =
    `${now.getFullYear()} 年 ${now.getMonth()+1} 月第${getWeekOfMonth(now)}週`;

  // article
  document.getElementById('sheet-article').textContent = article;

  // questions
  const qList = document.getElementById('sheet-questions');
  qList.innerHTML = '';
  (qv.questions || []).forEach((item, i) => {
    qList.innerHTML += `
      <li>
        <span class="q-num">${i+1}.</span>
        <div>
          ${item.q}
          <span class="answer-line"></span>
          <span class="answer-line"></span>
        </div>
      </li>`;
  });

  // vocab cards
  const vocabWrap = document.getElementById('sheet-vocab');
  vocabWrap.innerHTML = '';
  (qv.vocab || []).forEach(v => {
    vocabWrap.innerHTML += `
      <div class="vocab-card-vertical">
        <div class="vocab-top-area">
          <div class="vocab-zhuyin">${v.zhuyin || ''}</div>
          <div class="tian-box ghost">${v.char}</div>
        </div>
        <div class="vocab-practice-col">
          ${Array(10).fill('<div class="tian-box"></div>').join('')}
        </div>
        <div class="vocab-phrase-area">造詞：</div>
      </div>`;
  });

  // math - rich situational card layout
  const mathGrid = document.getElementById('sheet-math');
  mathGrid.innerHTML = '';
  const firstItem = math.math && math.math[0];
  const mathType = firstItem ? (firstItem.type || 'calc') : 'calc';
  const isWordQ = mathType === 'word';
  mathGrid.className = 'math-grid' + (isWordQ ? ' math-grid-word' : '');

  (math.math || []).forEach((item, i) => {
    const num = `<span class="math-num">${i+1}.</span>`;
    if (isWordQ) {
      // word / situational type (clock, date, length)
      mathGrid.innerHTML += `
        <div class="math-card math-card-word">
          ${num}
          <div class="math-card-body">
            <div class="math-context">${item.context || ''}</div>
            <div class="math-question">${item.question || ''}</div>
            <div class="math-ans-row">答：<span class="math-ans-blank"></span></div>
          </div>
        </div>`;
    } else {
      // calc type with context
      const expr = (item.expr || '').replace('□', '<span class="math-ans-box">□</span>');
      mathGrid.innerHTML += `
        <div class="math-card">
          ${num}
          <div class="math-card-body">
            <div class="math-expr-row">${expr}</div>
          </div>
        </div>`;
    }
  });

  // answer sheet
  const answerGrid = document.getElementById('answer-grid');
  const answerSheet = document.getElementById('answer-sheet');
  const answerDate = document.getElementById('answer-date');
  if (answerDate) answerDate.textContent = document.getElementById('sheet-date').textContent;
  answerGrid.innerHTML = '';
  if (math.math && math.math.length > 0) {
    answerSheet.style.display = 'block';
    (math.math || []).forEach((item, i) => {
      const isWord = item.type === 'word';
      const exprText = isWord ? (item.question || '') : (item.expr || '');
      const shortExpr = exprText.length > 28 ? exprText.substring(0,28) + '\u2026' : exprText;
      answerGrid.innerHTML += `<div class="answer-item"><span class="ans-num">第 ${i+1} 題</span><span class="ans-val">${item.answer || '\u2014'}</span><span class="ans-expr">${shortExpr}</span></div>`;
    });
  }
}

function getWeekOfMonth(d) {
  const first = new Date(d.getFullYear(), d.getMonth(), 1).getDay();
  return Math.ceil((d.getDate() + first) / 7);
}
